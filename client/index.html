<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous Board</title>

<style>
body {
  background: #eef2ff;
  font-family: Verdana, Arial, sans-serif;
  font-size: 12px;
  margin: 0;
}

/* 상단 */
.header {
  text-align: center;
  padding: 12px;
  font-size: 18px;
  font-weight: bold;
  color: #223;
}

/* 컨테이너 */
.container {
  max-width: 800px;
  margin: auto;
  background: #fff;
  border: 1px solid #ccd;
  padding: 10px;
}

/* 모바일 */
@media (max-width: 600px) {
  .container {
    width: 100%;
    border: none;
    padding: 8px;
  }
}

/* 작성폼 */
.form {
  background: #f0f4ff;
  border: 1px solid #ccd;
  padding: 8px;
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  height: 70px;
  border: 1px solid #ccd;
  font-size: 12px;
  resize: none;
}

input[type="file"] {
  margin-top: 5px;
}

button {
  margin-top: 5px;
  padding: 4px 10px;
  font-size: 12px;
  cursor: pointer;
}

/* 게시글 */
.post {
  border-top: 1px solid #dde;
  padding: 6px 0;
}

.post-header {
  font-size: 11px;
  color: #556;
  margin-bottom: 3px;
}

.post-id {
  color: #889;
}

.post-content {
  white-space: pre-wrap;
  line-height: 1.4;
  word-break: break-word;
}

/* 이미지 */
.post img {
  max-width: 200px;
  margin-top: 5px;
  display: block;
  border: 1px solid #ccd;
  cursor: pointer;
  transition: 0.2s;
}

.post img:hover {
  opacity: 0.85;
}

/* 이미지 확대 */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
}

.modal img {
  display: block;
  max-width: 90%;
  max-height: 90%;
  margin: 5% auto;
}
</style>
</head>

<body>

<div class="header">Anonymous Board</div>

<div class="container">

<div class="form">
  <textarea id="content" placeholder="내용 입력"></textarea><br>
  <input type="file" id="image"><br>
  <button onclick="post()">작성</button>
</div>

<div id="list"></div>

</div>

<!-- 이미지 확대 -->
<div id="modal" class="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>
async function load(){
  const res = await fetch('/api/posts');
  const data = await res.json();

  const list = document.getElementById('list');
  list.innerHTML = '';

  data.forEach(p => {
    const div = document.createElement('div');
    div.className = 'post';

    div.innerHTML = `
      <div class="post-header">
        Anonymous <span class="post-id">No.${p.id}</span>
      </div>
      <div class="post-content">${escapeHtml(p.content)}</div>
      ${p.image ? `<img src="${p.image}" onclick="openModal('${p.image}')">` : ''}
    `;

    list.appendChild(div);
  });
}

async function post(){
  const content = document.getElementById('content').value;
  const image = document.getElementById('image').files[0];

  const formData = new FormData();
  formData.append('content', content);
  if(image) formData.append('image', image);

  await fetch('/api/posts',{
    method:'POST',
    body: formData
  });

  document.getElementById('content').value='';
  document.getElementById('image').value='';
  load();
}

/* XSS 방지 */
function escapeHtml(text) {
  if(!text) return '';
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

/* 이미지 확대 */
function openModal(src){
  const modal = document.getElementById('modal');
  const img = document.getElementById('modalImg');
  img.src = src;
  modal.style.display = 'block';
}

function closeModal(){
  document.getElementById('modal').style.display = 'none';
}

load();
</script>

</body>
</html>
