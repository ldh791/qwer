<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board</title>

<style>
* {
  box-sizing: border-box;
}

body {
  background: #eef2ff;
  font-family: Verdana;
  font-size: 12px;
  margin: 0;
}

.header {
  text-align: center;
  padding: 10px;
  font-size: 18px;
}

.container {
  max-width: 800px;
  margin: auto;
  background: #fff;
  border: 1px solid #ccd;
  padding: 10px;
}

.board-menu {
  text-align: center;
  margin-bottom: 10px;
}

.board-menu a {
  margin: 0 5px;
  text-decoration: none;
  color: blue;
}

/* 🔥 모바일 핵심 수정 */
textarea {
  width: 100%;
  max-width: 100%;
  height: 60px;
}

input[type="file"] {
  width: 100%;
}

button {
  margin-top: 5px;
}

.form {
  background: #f0f4ff;
  padding: 8px;
  margin-bottom: 10px;
  overflow: hidden;
}

.post {
  border-top: 1px solid #ddd;
  padding: 5px;
}

.reply {
  margin-left: 15px;
  border-left: 2px solid #ccc;
  padding-left: 5px;
}

img {
  max-width: 100%;
  height: auto;
  margin-top: 5px;
}

@media (max-width: 600px) {
  .container {
    border: none;
    padding: 8px;
  }
}
</style>
</head>

<body>

<div class="header">Anonymous Board</div>

<div class="board-menu">
  <a href="/b">/b</a>
  <a href="/g">/g</a>
</div>

<div class="container">

<div class="form">
  <textarea id="content" placeholder="내용 입력"></textarea>
  <input type="file" id="image">
  <button onclick="post()">작성</button>
</div>

<div id="list"></div>

</div>

<script>
let currentBoard = window.location.pathname.replace('/', '') || 'b';

async function load(){
  const res = await fetch('/api/posts/' + currentBoard);
  const data = await res.json();

  const list = document.getElementById('list');
  list.innerHTML = '';

  data.forEach(p => {
    const div = document.createElement('div');
    div.className = 'post';

    let repliesHTML = '';

    p.replies.forEach(r => {
      repliesHTML += `
        <div class="reply">
          ${escape(r.content)}
          ${r.image ? `<img src="${r.image}">` : ''}
          <button onclick="delReply(${p.id},${r.id})">삭제</button>
        </div>
      `;
    });

    div.innerHTML = `
      <b>No.${p.id}</b>
      <button onclick="delPost(${p.id})">삭제</button><br>
      ${escape(p.content)}
      ${p.image ? `<img src="${p.image}">` : ''}

      <div>
        <textarea id="reply-${p.id}"></textarea>
        <button onclick="reply(${p.id})">댓글</button>
      </div>

      ${repliesHTML}
    `;

    list.appendChild(div);
  });
}

async function post(){
  const form = new FormData();
  form.append('content', document.getElementById('content').value);

  const file = document.getElementById('image').files[0];
  if(file) form.append('image', file);

  await fetch('/api/post/' + currentBoard,{
    method:'POST',
    body: form
  });

  load();
}

async function reply(id){
  const form = new FormData();
  form.append('content', document.getElementById('reply-'+id).value);

  await fetch('/api/reply/'+id,{
    method:'POST',
    body: form
  });

  load();
}

async function delPost(id){
  const pass = prompt("관리자 비번");

  await fetch('/api/post/'+id,{
    method:'DELETE',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({pass})
  });

  load();
}

async function delReply(postId, replyId){
  const pass = prompt("관리자 비번");

  await fetch(`/api/reply/${postId}/${replyId}`,{
    method:'DELETE',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({pass})
  });

  load();
}

function escape(str){
  if(!str) return '';
  return str.replace(/</g,"&lt;");
}

load();
</script>

</body>
</html>
